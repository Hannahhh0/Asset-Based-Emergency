<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <nav>
        <a href="../homepage.html">Home</a>
    </nav>

    <dialog id="myModal">
        <h2>ERROR</h2>
        <p>Unauthorized User Access</p>
        <button id="closeModal">Close</button>
    </dialog>

    <div class="page-content">
        <div class="login-box">
            <h1>Login</h1>
            <p>Please sign in with your authorized google account</p>
            <button onclick="signInWithGoogle()">Sign in with Google</button>
        </div>
    </div>


    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCTFi3yRm9DEoj9jqTPGX5tbVS2kxhbkiI",
            authDomain: "asset-based-emergency.firebaseapp.com",
            projectId: "asset-based-emergency",
            storageBucket: "asset-based-emergency.firebasestorage.app",
            messagingSenderId: "166630111593",
            appId: "1:166630111593:web:9f8942e7301ca552e565f8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const db = getFirestore(app);

        const modal = document.getElementById("myModal");
        const closeModal = document.getElementById("closeModal");

        closeModal.addEventListener("click", async () => {
            modal.close();
            await auth.signOut();
            window.location.replace("../homepage.html");
        });

        window.signInWithGoogle = async function () {
            try {
                const result = await signInWithPopup(auth, provider);
                const email = result.user.email;

                const docSnap = await getDoc(doc(db, "users", email));

                if (!docSnap.exists()) {
                    modal.showModal();
                    await auth.signOut();
                    return;
                }
                window.location.replace("../homepage.html");
            } catch (error) {
                console.error(error);
                modal.showModal();
                await auth.signOut();
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log("User is logged in:", user.email);
            } else {
                console.log("No user logged in");
            }
        });

        document.getElementById("logoutBtn").addEventListener("click", async () => {
            await auth.signOut();
        });
    </script>
    
    
</body>
</html>
