<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Participant Profile</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: #f4f6fb;
            color: #1a1a2e;
        }

        nav {
            background-color: #1a2a5e;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }

        nav div {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        nav a, nav button {
            color: white;
            font-family: Arial, sans-serif;
            text-decoration: none;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 15px;
        }

        nav a:hover, nav button:hover {
            text-decoration: underline;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .card {
            background: white;
            border: 1px solid #dce3f0;
            border-radius: 6px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 2px 10px rgba(26,42,94,0.07);
        }

        h1 {
            color: #1a2a5e;
            margin-bottom: 10px;
        }

        h2 {
            margin-top: 20px;
            margin-bottom: 10px;
            color: #1a2a5e;
        }

        .field {
            margin-bottom: 8px;
            color: #444;
        }

        .label {
            font-weight: bold;
            color: #1a2a5e;
        }

        .call {
            border-left: 3px solid #1a2a5e;
            padding-left: 10px;
            margin-bottom: 10px;
        }

        .call-item {
            margin-bottom: 10px;
            border-left: 3px solid #1a2a5e;
            padding-left: 10px;
        }

        .call-date {
            background: none;
            border: none;
            font-weight: bold;
            color: #1a2a5e;
            cursor: pointer;
            font-size: 14px;
            padding: 5px 0;
            text-align: left;
        }

        .call-date:hover {
            text-decoration: underline;
        }

        .call-note {
            display: none;
            margin-top: 5px;
            color: #444;
            font-size: 14px;
            line-height: 1.4;
        }

        .back {
            margin-top: 20px;
            display: inline-block;
            color: #1a2a5e;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <nav>

        <div>
            <a href="dashboard.html">← Back to Dashboard</a>
        </div>
    
        <div>
    
            <button id="editBtn">Edit Participant</button>
    
            <button
                id="saveBtn"
                style="display:none;">
                Save Changes
            </button>
    
            <button id="logoutBtn">
                Logout
            </button>

            <button id="deleteBtn" style="color:#ff6b6b;">
                Delete Participant
            </button>
    
        </div>
    
    </nav>

<div class="container" id="content">
    Loading participant...
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import {getFirestore, doc, getDoc, collection, getDocs, updateDoc, deleteDoc, addDoc} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
            apiKey: "AIzaSyCTFi3yRm9DEoj9jqTPGX5tbVS2kxhbkiI",
            authDomain: "asset-based-emergency.firebaseapp.com",
            projectId: "asset-based-emergency",
            storageBucket: "asset-based-emergency.firebasestorage.app",
            messagingSenderId: "166630111593",
            appId: "1:166630111593:web:9f8942e7301ca552e565f8"
        };

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const urlParams = new URLSearchParams(window.location.search);
const participantId = urlParams.get("id");

const content = document.getElementById("content");
const logoutBtn = document.getElementById("logoutBtn");
const editBtn = document.getElementById("editBtn");
const saveBtn = document.getElementById("saveBtn");
const deleteBtn = document.getElementById("deleteBtn");

let editing = false;

logoutBtn.addEventListener("click", async () => {
    await signOut(auth);
    window.location.href = "staffpage.html";
});

editBtn.addEventListener("click", () => {

    editing = true;

    editBtn.style.display = "none";

    saveBtn.style.display = "inline-block";

    loadParticipant(true);

});


saveBtn.addEventListener("click", async () => {

    try {

        const phone =
        document.getElementById("editPhone").value;

        const groupAssignment = 
        document.getElementById("editGroupAssignment").value;

        const email =
        document.getElementById("editEmail").value;

        const household =
        Number(document.getElementById("editHousehold").value);

        const address =
        document.getElementById("editAddress").value;

        const language =
        document.getElementById("editLanguage").value;

        const driverNotes = 
        document.getElementById("editDriverNotes").value;

        const docRef = doc(db, "participants", participantId);

        await updateDoc(docRef, {

            groupAssignment: groupAssignment,
            
            "contact.primaryPhone": phone,

            "contact.email": email,

            "household.size": household,

            "address.fullAddress": address,

            "demographics.preferredLanguage": language,

            "delivery.driverNotes": driverNotes

        });

        editing = false;

        saveBtn.style.display = "none";
        editBtn.style.display = "inline-block";

        await loadParticipant();

        alert("Changes saved successfully.");

    }

    catch (error) {

        console.error(error);

        alert("Unable to save changes.");

    }

});

deleteBtn.addEventListener("click", async () => {

try {

    const docRef = doc(db, "participants", participantId);

    let participantName = "Unknown";

    try {
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
            participantName = docSnap.data()?.name || "Unknown";
        }
    } catch (e) {
        console.log("Could not fetch participant name.");
    }

    const confirmDelete = confirm(
        `Delete ${participantName}? This cannot be undone.`
    );

    if (!confirmDelete) return;

    await createAuditLog(
        "DELETE_PARTICIPANT",
        participantId,
        participantName
    );

    const callsSnap = await getDocs(collection(docRef, "calls"));

    const deleteCalls = callsSnap.docs.map((d) =>
        deleteDoc(doc(db, "participants", participantId, "calls", d.id))
    );

    await Promise.all(deleteCalls);

    await deleteDoc(docRef);

    alert("Participant deleted successfully.");

    window.location.href = "dashboard.html";

} catch (error) {
    console.error(error);
    alert("Error deleting participant.");
}

});

//
async function createAuditLog(action, participantId, participantName) {

const user = auth.currentUser;

await addDoc(collection(db, "auditLogs"), {
    action: action,
    participantId: participantId,
    participantName: participantName || "Unknown",
    userEmail: user?.email || "Unknown user",
    timestamp: new Date().toISOString()
});

}
async function loadParticipant(editMode = false) {

    try {

        const docRef = doc(db, "participants", participantId);
        const docSnap = await getDoc(docRef);

        if (!docSnap.exists()) {
            content.innerHTML = "Participant not found.";
            return;
        }

        const data = docSnap.data();
        const callsSnap = await getDocs(collection(docRef, "calls"));

        let calls = [];

        callsSnap.forEach(c => {
            calls.push(c.data());
        });

        calls.sort((a, b) => {
            const [am, ad] = a.date.split("/").map(Number);
            const [bm, bd] = b.date.split("/").map(Number);

            return new Date(2026, am - 1, ad) - new Date(2026, bm - 1, bd);
        });
        content.innerHTML = `
            <div class="card">

                <h1>${data.name || "No Name"}</h1>


                <div class="field">
                    <span class="label">Group:</span>

                    ${
                        editMode
                        ? `<input
                                id="editGroupAssignment"
                                value="${data.groupAssignment || ""}">
                        `
                        : `${data.groupAssignment || ""}`
                    }

                </div>

                <div class="field">

                    <span class="label">Phone:</span>

                    ${
                        editMode
                        ? `<input
                                id="editPhone"
                                value="${data.contact?.primaryPhone || ""}">
                        `
                        : `${data.contact?.primaryPhone || ""}`
                    }

                </div>

                <div class="field">
                    <span class="label">Email:</span>

                    ${
                        editMode
                        ? `<input
                                id="editEmail"
                                value="${data.contact?.email || ""}">
                        `
                        : `${data.contact?.email || ""}`
                    }

                </div>

                <div class="field">
                    <span class="label">Household Size:</span>
                    ${
                        editMode
                        ? `<input
                                id="editHousehold"
                                type="number"
                                value="${data.household?.size || ""}">
                        `
                        : `${data.household?.size || ""}`
                    }
                </div>

                <div class="field">
                    <span class="label">Address:</span>
                    ${
                        editMode
                        ? `<input
                                id="editAddress"
                                value="${data.address?.fullAddress || ""}">
                        `
                        : `${data.address?.fullAddress || ""}`
                    }
                </div>

                <div class="field">
                    <span class="label">Language:</span>
                    ${
                        editMode
                        ? `<input
                                id="editLanguage"
                                value="${data.demographics?.preferredLanguage || ""}">
                        `
                        : `${data.demographics?.preferredLanguage || ""}`
                    }
                </div>

                <div class="field">
                    <span class="label">Medical Consent:</span>
                    ${data.medical?.medicalConsent || ""}
                </div>

                <div class="field">
                    <span class="label">Driver Notes:</span>

                    ${
                        editMode
                        ? `<input
                                id="editDriverNotes"
                                value="${data.delivery?.driverNotes || ""}">
                        `
                        : `${data.delivery?.driverNotes || ""}`
                    }

                </div>

            </div>

            <div class="card">

                <h2>Call History</h2>

                ${
                    calls.length === 0
                    ? "<p>No call history.</p>"
                    : calls.map((c, index) => `
                        <div class="call-item">

                            <button class="call-date" onclick="toggleNote(${index})">
                                ${c.date}
                            </button>

                            <div class="call-note" id="note-${index}">
                                ${c.notes}
                            </div>

                        </div>
                    `).join("")
                }

            </div>
        `;

        } catch (error) {
        console.error(error);
        content.innerHTML = "Error loading participant.";
        }

}

onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = "staffpage.html";
        return;
    }

    if (!participantId) {
        content.innerHTML = "No participant selected.";
        return;
    }

    await loadParticipant();

});

window.toggleNote = function(index) {
    const allNotes = document.querySelectorAll(".call-note");

    allNotes.forEach((note, i) => {
        if (i === index) {
            const isOpen = note.style.display === "block";
            note.style.display = isOpen ? "none" : "block";
        } else {
            note.style.display = "none";
        }
    });
};

</script>

</body>
</html>
