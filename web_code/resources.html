    <style>
        

        .slider::-webkit-scrollbar {
            display: none;
        }

        .slider {
            margin: 100px auto;
            width: 90%;
            overflow: hidden;
            height: fit-content;

            -webkit-mask-image: linear-gradient(
                to right,
                transparent,
                black 4%,
                black 96%,
                transparent
            );

            mask-image: linear-gradient(
                to right,
                transparent,
                black 4%,
                black 96%,
                transparent
            );
        }

        .track:hover {
            animation-play-state: paused;
        }

        .card:hover {
            transform: scale(1.1);

        }

        .track {
            display: flex;
            width: max-content;
            animation: scroll 15s linear infinite;
        }

        .group {
            display: flex;
            gap: 2rem;
            flex-shrink: 0;
            padding-right: 2rem;
            padding-top: 1rem;
            padding-bottom: 1rem;
        }

        .card {
            width: 250px;
            height: 250px;
            background: white;
            color: white;
            font-size: 3rem;
            border-radius: 10px;
            border: 4px solid black;

            display: flex;
            align-items: center;
            justify-content: center;

            flex: 0 0 250px;
            text-decoration: none;
            padding: 0;
        }

        .card img {
            display: block;
            width: 100%;
            height: 100%;
            max-width: 100%;
            object-fit: contain;
            border-radius: 2px;
        }


        @keyframes scroll {
            from {
                transform: translateX(0);
            }

            to {
                transform: translateX(-50%);
            }
        }



    </style>
