<!DOCTYPE html>
<html lang="en">
<head>

function toBool(value) {
    if (value === "yes") return true;
    if (value === "no") return false;
    return null;

}

saveBtn.addEventListener("click", async () => {
    try {

        const getValue = (id) => {
            const element = document.getElementById(id);
            return element ? element.value : null;
        };


        const groupAssignment = getValue("editGroupAssignment");

        const phone = getValue("editPhone");
        const alternatePhone = getValue("editAlternatePhone");

        const textsPreferred = 
            toBool(getValue("editTextsPreferred"));

        const canReceiveTexts = 
            toBool(getValue("editCanReceiveTexts"));

        const email = getValue("editEmail");


        const household = Number(getValue("editHousehold"));
        const bags = Number(getValue("editBags"));


        const language = getValue("editLanguage");
        const pronouns = getValue("editPronouns");
        const raceEthnicity = getValue("editRaceEthnicity");


        const driverNotes = getValue("editDriverNotes");


        const lockedBuildingRaw = getValue("editLockedBuilding");

        const lockedBuilding =
            lockedBuildingRaw === "true"
            ? true
            : lockedBuildingRaw === "false"
            ? false
            : null;

        const distanceFromFFS = 
            getValue("editDistanceFromFFS");
        const driveTimeMinutes = 
        Number(getValue("editDriveTime"));
        const medicalConsent =
            toBool(getValue("editMedicalConsent"));
        const annualSurveyComplete =
            toBool(getValue("editAnnualSurveyComplete"));
        const paired =
            toBool(getValue("editPaired"));
        const pairedWith =
            getValue("editPairedWith");
        const teamNotes =
            getValue("editTeamNotes");

        const address = getValue("editAddress");
        const street = getValue("editStreet");
        const city = getValue("editCity");
        const state = getValue("editState");
        const postalCode = getValue("editPostalCode");
        const country = getValue("editCountry");


        const docRef = doc(db, "participants", participantId);


        await updateDoc(docRef, {


            groupAssignment,


            "contact.primaryPhone": phone,
            "contact.alternatePhone": alternatePhone,
            "contact.textsPreferred": textsPreferred,
            "contact.canReceiveTexts": canReceiveTexts,
            "contact.email": email,


            "household.size": household,
            "household.bags": bags,


            "demographics.preferredLanguage": language,
            "demographics.pronouns": pronouns,
            "demographics.raceEthnicity": raceEthnicity,


            "location.distanceFromFFS": distanceFromFFS,
            "location.driveTimeMinutes": driveTimeMinutes,


            "delivery.lockedBuilding": lockedBuilding,
            "delivery.driverNotes": driverNotes,


            "medical.medicalConsent": medicalConsent,


            "status.annualSurveyComplete": annualSurveyComplete,
            "status.paired": paired,
            "status.pairedWith": pairedWith || null,


            "notes.teamNotes": teamNotes,

            "address.fullAddress": address,
            "address.street": street,
            "address.city": city,
            "address.state": state,
            "address.postalCode": postalCode,
            "address.country": country,

        });


        editing = false;

        saveBtn.style.display = "none";
        cancelBtn.style.display = "none";
        editBtn.style.display = "inline-block";

    } catch(error){

});

cancelBtn.addEventListener("click", async () => {

    saveBtn.style.display = "none";

    await loadParticipant();

});

deleteBtn.addEventListener("click", async () => {

    try {

        const docRef = doc(db, "participants", participantId);

        let participantName = "Unknown";

        try {
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                participantName = docSnap.data()?.name || "Unknown";
            }
        } catch (e) {
            console.log("Could not fetch participant name.");
        }

        const confirmDelete = confirm(
            `Delete ${participantName}? This cannot be undone.`
        );

        if (!confirmDelete) return;

        await createAuditLog(
            "DELETE_PARTICIPANT",
            participantId,
            participantName
        );

        const callsSnap = await getDocs(collection(docRef, "calls"));

        const deleteCalls = callsSnap.docs.map((d) =>
            deleteDoc(doc(db, "participants", participantId, "calls", d.id))
        );

        await Promise.all(deleteCalls);

        await deleteDoc(docRef);

        alert("Participant deleted successfully.");

        window.location.href = "dashboard.html";

    } catch (error) {
        console.error(error);
        alert("Error deleting participant.");
    }

});

//helper func bool to yes/no
function formatYesNo(value) {
    if (value === null || value === undefined) return "";
    return value ? "Yes" : "No";
}

//audit-log code here (need to make separate page for this)

async function createAuditLog(action, participantId, participantName) {

const user = auth.currentUser;

await addDoc(collection(db, "auditLogs"), {
    action: action,
    participantId: participantId,
    participantName: participantName || "Unknown",
    userEmail: user?.email || "Unknown user",
    timestamp: new Date().toISOString()
});

}

//loading participants code here (has all fields you see in firestore)

async function loadParticipant(editMode = false, role = "staff") {

        calls.sort((a, b) => {
            const [am, ad] = a.date.split("/").map(Number);

                collection(docRef, "deliveryHistory")

                                ? `<input id="editAlternatePhone" value="${data.contact?.alternatePhone || ""}">`

onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = "staffpage.html";
        return;
    }

    const userRef = doc(db, "users", user.email);
    const userSnap = await getDoc(userRef);

    if (!userSnap.exists()) {
        await signOut(auth);
        window.location.href = "staffpage.html";
        return;
    }

    const roles = userSnap.data().roles || [];

    if (!participantId) {
        content.innerHTML = "No participant selected.";
        return;
    }

    if (roles.includes("staff")) {
        await loadParticipant(false, "staff");
        return;
    }

    if (roles.includes("caller")) {
        editBtn.style.display = "none";
        deleteBtn.style.display = "none";
        saveBtn.style.display = "none";
        cancelBtn.style.display = "none";

        await loadParticipant(false, "caller");
        return;
    }

    await signOut(auth);
    window.location.href = "staffpage.html";
});

window.toggleNote = function(index) {
    const allNotes = document.querySelectorAll(".call-note");

    allNotes.forEach((note, i) => {
        if (i === index) {
            const isOpen = note.style.display === "block";
            note.style.display = isOpen ? "none" : "block";
        } else {
            note.style.display = "none";
        }
    });
};

window.toggleDelivery = function(index) {
    const note = document.getElementById(`delivery-note-${index}`);

    if (note.style.display === "block") {
        note.style.display = "none";
    } else {
        note.style.display = "block";
    }
};

window.toggleSection = function(id) {
    const section = document.getElementById(id);
    if (!section) return;

    const isHidden = section.classList.contains("hidden");

    if (isHidden) {
        section.classList.remove("hidden");
    } else {
        section.classList.add("hidden");
    }
};

window.saveCall = async function() {
    const notes = document.getElementById("newCallNotes").value.trim();

    if (!notes) {
        alert("Please enter call notes.");
        return;
    }

    const now = new Date();
    const date = `${now.getMonth() + 1}-${now.getDate()}`;
    const dateDash = `${now.getMonth() + 1}/${now.getDate()}`;
    const docId = `${now.getMonth() + 1}-${now.getDate()}_${now.getHours()}-${now.getMinutes()}`;

    try {
        const callDocRef = doc(db, "participants", participantId, "calls", date);
        await setDoc(callDocRef, {
            date: dateDash,
            notes: notes,
            loggedBy: auth.currentUser.email,
            timestamp: now.toISOString()
        });

        document.getElementById("newCallNotes").value = "";
        alert("Call logged successfully.");

    } catch (error) {
        console.error(error.code, error.message);
        alert("Error saving call.");
    }
};

</script>
