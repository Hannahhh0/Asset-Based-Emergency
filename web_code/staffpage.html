<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>staff login</title>
    <link rel="stylesheet" href="staffpage.css">
</head>
<body>

    <nav>
        <a href="homepage.html">Home</a>
    </nav>

    <dialog id="myModal">
        <h2>ERROR</h2>
        <p>Unauthorized User Access</p>
        <button id="closeModal">Close</button>
    </dialog>

    <div class="page-content">
        <div class="login-box">
            <h1>Staff Login</h1>
            <p>Please sign in with your authorized google account</p>
            <button onclick="signInWithGoogle()">Sign in with Google</button>
        </div>
    </div>


    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCTFi3yRm9DEoj9jqTPGX5tbVS2kxhbkiI",
            authDomain: "asset-based-emergency.firebaseapp.com",
            projectId: "asset-based-emergency",
            storageBucket: "asset-based-emergency.firebasestorage.app",
            messagingSenderId: "166630111593",
            appId: "1:166630111593:web:9f8942e7301ca552e565f8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const db = getFirestore(app);

        const modal = document.getElementById("myModal");
        const closeModal = document.getElementById("closeModal");
        closeModal.addEventListener("click", async () => {
            modal.close();
            await auth.signOut();
        });

        window.signInWithGoogle = function () {
            signInWithPopup(auth, provider)
                .then(async (result) => {
                    const email = result.user.email;
                    const docRef = doc(db, "users", email);

                    try {
                        const docSnap = await getDoc(docRef);

                        if (docSnap.exists()) {
                            console.log("Access granted");
                            window.location.href = "dashboard.html";
                        } else {
                            console.log("Access denied");
                            modal.showModal();
                            await auth.signOut();
                        }
                    } catch (error) {
                        // This catches the permission-denied error from Firestore rules
                        console.log("Access denied:", error.code);
                        modal.showModal();
                        await auth.signOut();
                    }
                })
                .catch((error) => {
                    console.error("Sign-in error:", error);
                });
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log("User is logged in:", user.email);
            } else {
                console.log("No user logged in");
            }
        });
    </script>

    
</body>
</html>
