<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Participant</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Georgia, serif;
            background: #f4f6fb;
            color: #1a1a2e;
        }

        nav {
            background-color: #1a2a5e;
            height: 60px;
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a,
        nav button {
            color: white;
            text-decoration: none;
            font-family: Arial, sans-serif;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 15px;
        }

        nav a:hover,
        nav button:hover {
            text-decoration: underline;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .card {
            background: white;
            border-radius: 6px;
            padding: 30px;
            border: 1px solid #dce3f0;
            box-shadow: 0 2px 10px rgba(26,42,94,0.07);
        }

        h1 {
            color: #1a2a5e;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #1a2a5e;
            font-weight: bold;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #cfd7e6;
            border-radius: 4px;
            font-size: 14px;
        }

        textarea {
            height: 90px;
        }

        .save-btn {
            background: #1a2a5e;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 15px;
        }

        .save-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

<nav>
    <a href="dashboard.html">← Dashboard</a>
    <button id="logoutBtn">Logout</button>
</nav>

<div class="container">

    <div class="card">

        <h1>Add Participant</h1>

        <div class="form-group">
            <label>Name</label>
            <input id="name">
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input id="phone">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input id="email">
        </div>

        <div class="form-group">
            <label>Household Size</label>
            <input id="household" type="number">
        </div>

        <div class="form-group">
            <label>Address</label>
            <input id="address">
        </div>

        <div class="form-group">
            <label>Preferred Language</label>
            <input id="language">
        </div>

        <div class="form-group">
            <label>Group Assignment</label>
            <input id="group">
        </div>

        <div class="form-group">
            <label>Team Notes</label>
            <textarea id="notes"></textarea>
        </div>

        <button class="save-btn" id="saveBtn">
            Save Participant
        </button>

    </div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
    getAuth,
    onAuthStateChanged,
    signOut
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

import {
    getFirestore,
    doc,
    setDoc,
    getDoc
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
            apiKey: "AIzaSyCTFi3yRm9DEoj9jqTPGX5tbVS2kxhbkiI",
            authDomain: "asset-based-emergency.firebaseapp.com",
            projectId: "asset-based-emergency",
            storageBucket: "asset-based-emergency.firebasestorage.app",
            messagingSenderId: "166630111593",
            appId: "1:166630111593:web:9f8942e7301ca552e565f8"
        };

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const logoutBtn = document.getElementById("logoutBtn");

logoutBtn.addEventListener("click", async () => {
    await signOut(auth);
    window.location.href = "staffpage.html";
});

onAuthStateChanged(auth, (user) => {
    if (!user) {
        window.location.href = "staffpage.html";
    }
});

function generateParticipantID() {
    return Math.floor(Math.random() * 4294967295)
        .toString(16)
        .toUpperCase()
        .padStart(8, "0")
        .slice(-5);
}

async function createUniqueID() {

    let id;
    let exists = true;

    while (exists) {

        id = generateParticipantID();

        const testDoc =
            await getDoc(doc(db, "participants", id));

        exists = testDoc.exists();
    }

    return id;
}

document
    .getElementById("saveBtn")
    .addEventListener("click", async () => {

        const participantID = await createUniqueID();

        const data = {

            name:
                document.getElementById("name").value,

            groupAssignment:
                document.getElementById("group").value,

            contact: {
                primaryPhone:
                    document.getElementById("phone").value,

                email:
                    document.getElementById("email").value
            },

            household: {
                size:
                    Number(
                        document.getElementById("household").value
                    )
            },

            address: {
                fullAddress:
                    document.getElementById("address").value
            },

            demographics: {
                preferredLanguage:
                    document.getElementById("language").value
            },

            notes: {
                teamNotes:
                    document.getElementById("notes").value
            }
        };

        await setDoc(
            doc(db, "participants", participantID),
            data
        );

        alert(
            "Participant added.\nID: " +
            participantID
        );

        window.location.href = "dashboard.html";
    });

</script>

</body>
</html>
